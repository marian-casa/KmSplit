name: kmsplit
services:
  db:
    image: postgres:16-alpine
    container_name: kmsplit_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kmsplit}
      POSTGRES_USER: ${POSTGRES_USER:-kmsplit_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kmsplit_pass}
    ports:
      - "5432:5432"
    volumes:
      - kmsplit_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kmsplit_user} -d ${POSTGRES_DB:-kmsplit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: kmsplit_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: kmsplit_frontend
    restart: unless-stopped
    command: npm start -- --host 0.0.0.0 --poll 500
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  kmsplit_db_data:
